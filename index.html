<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Support Portal</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        .hidden { display: none; }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; text-align: center; }
        input[type="password"], select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        /* Main Buttons */
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; font-weight: bold; }
        button:hover { background: #2980b9; }
        .back-btn { background: #95a5a6; margin-top: 20px; }

        /* Video Styling */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; }

        /* Quiz Card & SQUARE BUTTONS */
        .quiz-card { background: #ebf5fb; padding: 20px; border-radius: 10px; margin-top: 15px; border: 1px solid #d1e9f9; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        
        /* Hide the actual radio circle */
        .quiz-options input[type="radio"] { display: none; }

        /* Make the label look like a square button */
        .quiz-options label {
            display: block;
            padding: 15px;
            background: #ffffff;
            border: 2px solid #d1d8e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 500;
        }

        /* The "Depressed" / Pressed state */
        .quiz-options input[type="radio"]:checked + label {
            background-color: var(--accent);
            color: white;
            border-color: #2980b9;
            transform: scale(0.97); /* Sinks the button slightly */
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
        }

        .quiz-options label:hover { background: #f0faff; border-color: var(--accent); }

        .weekly-update { margin-bottom: 50px; padding-bottom: 20px; }
        .old-week { opacity: 0.7; border-top: 2px dashed #eee; padding-top: 20px; }
        hr { border: none; border-top: 2px dashed #ccc; margin: 40px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login">
        <h2>Welcome to Jalan Bukit Merah</h2>
        <input type="password" id="pass-input" placeholder="Enter Access Code">
        <button onclick="checkPass()">Login</button>
    </div>

    <div id="view-dash" class="hidden">
        <h2>Dashboard</h2>
        <button onclick="showView('attendance')">📝 Attendance Form</button>
        <button onclick="showView('resources')">📚 Weekly Resources</button>
    </div>

    <div id="view-attendance" class="hidden">
        <h2>Attendance</h2>
        <form id="attendance-form">
            <label>Mentor Name</label>
            <select id="mentor-select" name="mentor" required><option>Loading names...</option></select>
            <label>Student Name</label>
            <select id="student-select" name="student" required><option>Loading names...</option></select>
            <label>Main Learning Points</label>
            <textarea name="points" rows="4" required placeholder="What did you cover today?"></textarea>
            <label>Other Comments</label>
            <textarea name="comments" rows="2" placeholder="Optional notes..."></textarea>
            <button type="submit" id="submit-btn">Submit Attendance</button>
        </form>
        <button class="back-btn" onclick="showView('dash')">Back</button>
    </div>

    <div id="view-resources" class="hidden">
        <h2>Weekly Learning Resources</h2>
        
        <button class="back-btn" onclick="showView('dash')"style="margin-bottom: 20px;">Back to Dashboard</button>

        <div class="weekly-update">
            <h3 style="color: var(--accent);">Session 1 (14 April)</h3>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/WBGPQIukC-A" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="quiz-card">
                <p>1. Where was Zakia's Safespace?</p>
                <div class="quiz-options">
                    <input type="radio" name="q-w2" id="w2-optA">
                    <label for="w2-optA">The school</label>

                    <input type="radio" name="q-w2" id="w2-correct">
                    <label for="w2-correct">The community</label> 
                    
                    <input type="radio" name="q-w2" id="w2-optC">
                    <label for="w2-optC">Her family</label>
                </div>
                <button onclick="checkQuiz('w2-correct', 'w2-msg')">Check Answer</button>
                <p id="w2-msg" style="text-align:center; font-weight:bold;"></p>
            </div>
        </div>
        <hr>



<script>
    // --- EDIT THESE TWO LINES ---
    const CONFIG = {
        PASS: "jbm26", 
        API: "https://script.google.com/macros/s/AKfycbxk5-G8CjSLy_ouqcVYgkLJxojAmNX57vsy54tg4zLyZiSOBN36BpsZbCTF42K4YVQX/exec" 
    };

    function checkPass() {
        if (document.getElementById('pass-input').value === CONFIG.PASS) {
            showView('dash');
            fetchNames();
        } else { alert("Incorrect code."); }
    }

    function showView(id) {
        document.querySelectorAll('body > .container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('view-' + id).classList.remove('hidden');
    }

    async function fetchNames() {
        try {
            const res = await fetch(CONFIG.API);
            const data = await res.json();
            document.getElementById('mentor-select').innerHTML = data.mentors.map(n => `<option>${n}</option>`).join('');
            document.getElementById('student-select').innerHTML = data.students.map(n => `<option>${n}</option>`).join('');
        } catch (e) { console.error("Could not load names."); }
    }

    document.getElementById('attendance-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Sending...";
        const data = Object.fromEntries(new FormData(e.target));
        try {
            await fetch(CONFIG.API, { method: 'POST', body: JSON.stringify(data) });
            alert("Attendance Recorded!");
            e.target.reset();
            showView('dash');
        } catch (e) { alert("Error saving data."); }
        btn.innerText = "Submit to Google Sheets";
    };

    function checkQuiz(correctId, msgId) {
        const isCorrect = document.getElementById(correctId).checked;
        const msg = document.getElementById(msgId);
        msg.innerText = isCorrect ? "✅ Correct!" : "❌ Try again.";
        msg.style.color = isCorrect ? "green" : "red";
    }
</script>
</body>
</html>
